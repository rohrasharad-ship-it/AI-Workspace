<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SHA-51 mockup — Mobile LinkedIn blurb</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: system-ui, sans-serif; background:#1a1a2e; color:#E2E8F0; min-height:100vh; display:flex; align-items:flex-end; justify-content:center; padding:20px; }
  .phone { width:360px; background:#0A0F1E; border-radius:24px; border:2px solid #334155; overflow:hidden; position:relative; height:520px; }
  .bg { opacity:0.35; padding:16px; font-size:12px; color:#64748B; }
  .sheet { position:absolute; bottom:0; left:0; right:0; background:#0E1629; border-radius:18px 18px 0 0; padding:18px; border-top:2px solid #38BDF8; }
  .name { font-size:19px; font-weight:800; margin-bottom:4px; }
  .cat { font-size:11px; color:#64748B; margin-bottom:12px; }
  .desc { font-size:13px; color:#CBD5E1; line-height:1.5; margin-bottom:16px; }
  .visit { display:block; padding:11px; background:rgba(56,189,248,0.12); border:1px solid rgba(56,189,248,0.3); border-radius:10px; color:#38BDF8; text-align:center; font-size:13px; font-weight:600; margin-bottom:8px; }
  .linkedin { display:block; padding:11px; background:rgba(10,102,194,0.18); border:2px dashed #0A66C2; border-radius:10px; color:#93C5FD; text-align:center; font-size:13px; font-weight:600; }
  .new { position:absolute; top:-10px; right:16px; background:#22C55E; color:#fff; font-size:10px; font-weight:700; padding:3px 8px; border-radius:99px; }
  .label { text-align:center; margin-top:16px; font-size:12px; color:#94A3B8; }
</style>
</head>
<body>
  <div>
    <div class="phone">
      <div class="bg">AI Landscape 2026 — mobile list behind sheet</div>
      <div class="sheet">
        <span class="new">NEW</span>
        <div class="name">TSMC</div>
        <div class="cat">Hardware · Foundries</div>
        <div class="desc">70% global foundry revenue share. 3nm in production…</div>
        <div class="visit">Visit tsmc.com →</div>
        <div class="linkedin">Copy LinkedIn blurb</div>
      </div>
    </div>
    <p class="label">Proposed: add Copy LinkedIn blurb below Visit site on mobile bottom sheet</p>
  </div>
</body>
</html>

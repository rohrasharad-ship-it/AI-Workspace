<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Preview: Life-area coverage meter — SHA-164</title>
<style>
  body { margin:0; font-family: -apple-system, Segoe UI, sans-serif; background:#12181a; color:#eef1ea; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:18px; }
  .grid { display:grid; grid-template-columns:repeat(3, 140px); gap:16px; }
  .node { background:#1b2422; border:1px solid #2f3b37; border-radius:12px; padding:14px; text-align:center; }
  .node strong { display:block; font-size:13px; margin-bottom:8px; }
  .bar-track { height:6px; border-radius:999px; background:#2a3531; overflow:hidden; margin-bottom:6px; }
  .bar-fill { height:100%; border-radius:999px; }
  .count { font-size:11px; color:#8a9a92; }
  .fitness .bar-fill { width:85%; background:#5a8a68; }
  .travel .bar-fill { width:60%; background:#5a8a68; }
  .music .bar-fill { width:6%; background:#5a4a2a; }
  .caption { font-size:12px; color:#7c8a83; text-align:center; max-width:420px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="node fitness">
      <strong>Fitness</strong>
      <div class="bar-track"><div class="bar-fill"></div></div>
      <span class="count">6 items</span>
    </div>
    <div class="node travel">
      <strong>Travel</strong>
      <div class="bar-track"><div class="bar-fill"></div></div>
      <span class="count">4 items</span>
    </div>
    <div class="node music">
      <strong>Music</strong>
      <div class="bar-track"><div class="bar-fill"></div></div>
      <span class="count">0 items</span>
    </div>
  </div>
  <div class="caption">Minimal-effort mockup for SHA-164 — a thin coverage bar under each life-area node shows how filled-in it is relative to others.</div>
</body>
</html>

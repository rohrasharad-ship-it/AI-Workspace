<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Preview: Approve/reject actions — SHA-161</title>
<style>
  body { margin:0; font-family: -apple-system, Segoe UI, sans-serif; background:#12181a; color:#eef1ea; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:14px; }
  .panel { width:420px; background:#1b2422; border:1px solid #2f3b37; border-radius:14px; padding:28px; box-shadow:0 20px 60px rgba(0,0,0,.4); }
  .pill-row { display:flex; gap:8px; margin-bottom:16px; }
  .pill { font-size:12px; padding:4px 10px; border-radius:999px; }
  .type { background:#68466f; color:#fff; }
  .review { background:#91651f; color:#fff; }
  h2 { margin:0 0 8px; font-size:20px; }
  p { color:#c3ccc6; line-height:1.5; }
  .actions { display:flex; gap:10px; margin-top:22px; flex-wrap:wrap; }
  button { font: inherit; font-size:13px; padding:9px 16px; border-radius:8px; border:1px solid #3a4a44; background:#232f2b; color:#eef1ea; cursor:default; }
  .approve { background:#2f4937; border-color:#3f6249; color:#d9f2e2; }
  .reject { background:#5a2a24; border-color:#7a3a30; color:#f2d9d4; }
  .caption { margin-top:20px; font-size:12px; color:#7c8a83; text-align:center; }
</style>
</head>
<body>
  <div class="panel">
    <div class="pill-row">
      <span class="pill type">Note</span>
      <span class="pill review">Pending review</span>
    </div>
    <h2>Note from last week's meeting about fitness</h2>
    <p>Discussed cardio endurance, strength training, half marathon timing, gym membership updates, and buying new running shoes.</p>
    <div class="actions">
      <button class="approve">✓ Approve</button>
      <button class="reject">✕ Reject</button>
      <button>Edit</button>
      <button>Correct</button>
      <button>Archive</button>
    </div>
  </div>
  <div class="caption">Minimal-effort mockup for SHA-161 — new Approve/Reject buttons on a pending item's detail panel.</div>
</body>
</html>

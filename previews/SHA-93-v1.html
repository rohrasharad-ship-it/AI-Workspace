<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>SHA-93 preview — Landscape Time Machine</title>
<style>
  body { margin:0; font-family:-apple-system,Segoe UI,Roboto,sans-serif; background:#0b0d12; color:#e8e8ec; }
  .bar { display:flex; align-items:center; gap:14px; padding:14px 18px; background:#14161d; border-bottom:1px solid #262a35; }
  .toggle { display:flex; background:#0b0d12; border:1px solid #2c313d; border-radius:8px; overflow:hidden; }
  .toggle span { padding:8px 16px; font-size:13px; color:#6c7484; }
  .toggle span.active { background:#4f7cff; color:#fff; }
  .stage { position:relative; height:520px; display:flex; align-items:center; justify-content:center; gap:60px; }
  .node { width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; text-align:center; background:#1a1e29; border:2px solid #2c313d; color:#7a8194; position:relative; }
  .node.new { border-color:#3ecf8e; color:#c8ffe6; box-shadow:0 0 0 4px rgba(62,207,142,.15); }
  .node.new::after { content:"NEW in 2026"; position:absolute; bottom:-22px; font-size:9px; color:#3ecf8e; white-space:nowrap; }
  .node.faded { opacity:.35; }
  .node.faded::after { content:"gone since 2025"; position:absolute; bottom:-22px; font-size:9px; color:#6c7484; white-space:nowrap; }
  .callout { position:absolute; bottom:30px; left:50%; transform:translateX(-50%); background:#1c2130; border:1px dashed #3ecf8e; border-radius:8px; padding:10px 14px; font-size:12px; max-width:420px; color:#c8ffe6; text-align:center; }
</style>
</head>
<body>
  <div class="bar">
    <span style="font-size:12px;color:#6c7484;">Landscape Time Machine</span>
    <div class="toggle"><span>2025</span><span class="active">2026</span></div>
  </div>
  <div class="stage">
    <div class="node new">DeepSeek V3</div>
    <div class="node">Claude 4.x</div>
    <div class="node faded">Old Model</div>
    <div class="callout">Idea: a year toggle swaps the dataset snapshot, showing what's new, what moved layers/popularity, and what dropped off — trend-over-time storytelling the single-snapshot map can't do today.</div>
  </div>
</body>
</html>

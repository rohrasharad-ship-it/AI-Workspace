<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>SHA-238 — Live Project Health Row (mockup)</title>
<meta name="robots" content="noindex" />
<style>
  body { font-family: system-ui, sans-serif; background: #0f1115; color: #e8e8ec; padding: 2rem; max-width: 720px; margin: 0 auto; }
  h1 { font-size: 1.25rem; }
  .note { color: #9a9aa5; font-size: 0.85rem; margin-bottom: 1.5rem; }
  .row { display: flex; align-items: center; justify-content: space-between; padding: 0.7rem 0.9rem; border: 1px solid #262833; border-radius: 8px; margin-bottom: 0.6rem; font-size: 0.9rem; }
  .cap { font-variant-numeric: tabular-nums; padding: 0.15rem 0.5rem; border-radius: 999px; font-size: 0.78rem; }
  .ok { background: #1c3b2d; color: #3ecf8e; }
  .warn { background: #3b331c; color: #e0b23e; }
</style>
</head>
<body>
  <h1>Live Project Health Row</h1>
  <p class="note">Minimal-effort mockup for SHA-238 — static frame, not interactive.</p>
  <div class="row"><span>Resume Website</span><span class="cap ok">2/5 cap</span><span>swept 2d ago</span></div>
  <div class="row"><span>PM OS</span><span class="cap ok">5/5 cap</span><span>swept today</span></div>
  <div class="row"><span>AI Landscape</span><span class="cap warn">4/5 cap</span><span>swept 9d ago</span></div>
  <div class="row"><span>Application Agent</span><span class="cap ok">0/5 cap</span><span>never swept</span></div>
  <div class="row"><span>Usercon</span><span class="cap ok">1/5 cap</span><span>swept 5d ago</span></div>
</body>
</html>

<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>SHA-125 preview — "New" catalog badge</title>
<style>
  body { margin:0; font-family: -apple-system, Segoe UI, Roboto, sans-serif; background:#0b0d12; color:#e8eaf0; display:flex; align-items:center; justify-content:center; height:100vh; }
  .node { position:relative; width:150px; height:150px; border-radius:50%; background:radial-gradient(circle at 35% 30%, #2c3a66, #12162a); border:2px solid #3b5bfd; display:flex; align-items:center; justify-content:center; text-align:center; font-size:13px; font-weight:600; }
  .badge { position:absolute; top:-10px; right:-6px; background:#ff5d73; color:white; font-size:10px; font-weight:700; padding:3px 8px; border-radius:999px; letter-spacing:.03em; box-shadow:0 2px 6px rgba(0,0,0,.4); }
  .caption { position:absolute; bottom:28px; font-size:12px; color:#7d8bb8; text-align:center; width:260px; }
</style>
</head>
<body>
  <div class="node">Sora 2<div class="badge">NEW</div></div>
  <div class="caption">Nodes added within the last catalog update show a small "NEW" badge in the ring — same treatment on desktop and mobile cards.</div>
</body>
</html>

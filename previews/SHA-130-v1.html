<!doctype html>
<html><head><meta charset="utf-8"><title>SHA-130 preview — New badges</title>
<style>
body{margin:0;background:#0A0F1E;color:#E2E8F0;font-family:-apple-system,Segoe UI,Helvetica,Arial,sans-serif;padding:40px;}
h2{font-size:14px;color:#64748B;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:20px;}
.row{display:flex;gap:40px;align-items:flex-start;}
.node-wrap{position:relative;width:90px;text-align:center;}
.node{width:64px;height:64px;border-radius:50%;background:#0E1629;border:2px solid #A855F7;margin:0 auto 8px;}
.badge{position:absolute;top:-6px;right:8px;background:#F59E0B;color:#0A0F1E;font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px;box-shadow:0 0 8px rgba(245,158,11,0.6);}
.glow{box-shadow:0 0 0 3px rgba(245,158,11,0.35);}
.label{font-size:11px;color:#CBD5E1;}
#side-panel{width:260px;background:#0E1629;border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:16px;}
#sp-name{font-size:16px;font-weight:800;color:#F8FAFC;display:flex;align-items:center;gap:8px;}
.sp-badge{background:#F59E0B;color:#0A0F1E;font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px;}
.note{margin-top:24px;max-width:640px;font-size:12px;color:#64748B;line-height:1.6;}
</style></head>
<body>
<h2>Concept — "New" badge on map node + side panel</h2>
<div class="row">
  <div class="node-wrap"><div class="badge">NEW</div><div class="node glow"></div><div class="label">Paperclip</div></div>
  <div id="side-panel">
    <div id="sp-name">Paperclip <span class="sp-badge">NEW</span></div>
    <div style="font-size:11px;color:#64748B;margin-top:6px;">Added 12 days ago</div>
  </div>
</div>
<div class="note">Rough placement only — orange glow ring + small "NEW" tag on the node itself, matching tag next to the name in the side panel. Not interactive; static frame.</div>
</body></html>

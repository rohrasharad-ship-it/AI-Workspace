<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>SHA-134 — Mobile popularity/link filters (mockup)</title>
<style>
  body { margin:0; background:#0B1120; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; display:flex; justify-content:center; padding:24px 0; }
  .phone { width:390px; background:#0B1120; border:1px solid rgba(255,255,255,0.12); border-radius:18px; overflow:hidden; }
  .header { padding:16px; border-bottom:1px solid rgba(255,255,255,0.08); }
  .title-row { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; }
  .title { font-size:20px; font-weight:800; color:#F8FAFC; }
  .title span { color:#38BDF8; }
  .sub { font-size:11px; color:#64748B; }
  .search { width:100%; box-sizing:border-box; padding:10px 12px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:#E2E8F0; font-size:14px; margin-bottom:10px; }
  .chips { display:flex; gap:6px; overflow-x:auto; padding-bottom:2px; margin-bottom:12px; }
  .chip { flex-shrink:0; padding:7px 13px; border-radius:14px; border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.04); color:#CBD5E1; font-size:12px; font-weight:600; }
  .chip.active { background:#38BDF8; color:#04121F; border-color:#38BDF8; }
  .new-block { border:1px dashed #FBBF24; border-radius:10px; padding:10px 12px; background:rgba(251,191,36,0.06); }
  .new-label { font-size:10px; color:#FBBF24; text-transform:uppercase; letter-spacing:.06em; margin-bottom:8px; font-weight:700; }
  .slider-row { display:flex; align-items:center; gap:8px; font-size:11px; color:#94A3B8; margin-bottom:8px; }
  .slider-row:last-child { margin-bottom:0; }
  .slider-row label { width:78px; flex-shrink:0; }
  input[type=range] { flex:1; accent-color:#38BDF8; }
  .val { width:22px; text-align:right; color:#E2E8F0; font-weight:600; }
  .body-fill { height:140px; display:flex; align-items:center; justify-content:center; color:#334155; font-size:12px; }
  .caption { max-width:390px; margin:14px auto 0; text-align:center; color:#64748B; font-size:12px; font-family:sans-serif; }
</style>
</head>
<body>
<div>
  <div class="phone">
    <div class="header">
      <div class="title-row">
        <div class="title">AI Landscape <span>2026</span></div>
        <div class="sub">156 tools · 6 layers</div>
      </div>
      <input class="search" placeholder="Search tools, categories…" disabled/>
      <div class="chips">
        <div class="chip active">All</div>
        <div class="chip">Hardware</div>
        <div class="chip">Infra</div>
        <div class="chip">Models</div>
        <div class="chip">Tools</div>
      </div>
      <div class="new-block">
        <div class="new-label">Proposed — new on mobile</div>
        <div class="slider-row">
          <label>Popularity ≥</label>
          <input type="range" min="0" max="100" value="60"/>
          <span class="val">60</span>
        </div>
        <div class="slider-row">
          <label>Link ≥</label>
          <input type="range" min="1" max="5" value="1"/>
          <span class="val">1</span>
        </div>
      </div>
    </div>
    <div class="body-fill">(catalog list below, unchanged)</div>
  </div>
  <div class="caption">Rough placement only — mobile equivalent of the desktop popularity/link-strength sliders, added below the category chips.</div>
</div>
</body>
</html>

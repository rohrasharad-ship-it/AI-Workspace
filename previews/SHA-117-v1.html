<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>SHA-117 preview — Save flagged answer as policy</title>
<style>
  body { margin:0; padding:32px; background:#f4f4f5; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; }
  .slack-msg { max-width:560px; margin:0 auto; background:#fff; border:1px solid #e2e2e2; border-radius:8px; padding:20px 22px; box-shadow:0 1px 2px rgba(0,0,0,.05); }
  .hdr { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  .avatar { width:36px; height:36px; border-radius:8px; background:#611f69; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:600; font-size:14px; }
  .name { font-weight:700; color:#1d1c1d; font-size:15px; }
  .label { display:inline-block; background:#ffe3e3; color:#c92a2a; font-size:11px; padding:2px 6px; border-radius:4px; margin-left:6px; }
  .time { color:#8a8a8e; font-size:12px; margin-left:6px; }
  .body-text { font-size:14px; color:#1d1c1d; line-height:1.5; margin-bottom:12px; }
  .q { border-left:3px solid #c92a2a; padding:8px 0 8px 12px; font-size:13px; color:#1d1c1d; margin-bottom:10px; }
  .input-box { border:1px solid #ced4da; border-radius:6px; padding:10px 12px; font-size:13px; color:#495057; background:#fafafa; margin-bottom:10px; }
  .actions { display:flex; gap:8px; }
  .btn { font-size:12.5px; font-weight:600; padding:6px 12px; border-radius:5px; border:1px solid #ced4da; background:#fff; color:#1d1c1d; }
  .btn.primary { background:#2f9e44; border-color:#2f9e44; color:#fff; }
</style>
</head>
<body>
  <div class="slack-msg">
    <div class="hdr">
      <div class="avatar">AA</div>
      <div>
        <span class="name">Application Agent</span><span class="label">Needs you</span>
        <div class="time">#application-agent · thread</div>
      </div>
    </div>
    <div class="body-text">One screening question wasn't covered by disclosure-policy.md — no fact invented, just need your answer once:</div>
    <div class="q">"Are you legally authorized to work in the country of this job posting?"</div>
    <div class="input-box">Type your answer here…</div>
    <div class="actions">
      <button class="btn primary">💾 Save as policy</button>
      <button class="btn">Answer once only</button>
    </div>
  </div>
</body>
</html>

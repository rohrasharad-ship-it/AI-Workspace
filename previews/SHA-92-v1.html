<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>SHA-92 preview — Trace the Stack path finder</title>
<style>
  body { margin:0; font-family:-apple-system,Segoe UI,Roboto,sans-serif; background:#0b0d12; color:#e8e8ec; }
  .bar { display:flex; align-items:center; gap:10px; padding:14px 18px; background:#14161d; border-bottom:1px solid #262a35; }
  .bar select { background:#0b0d12; border:1px solid #2c313d; border-radius:6px; color:#e8e8ec; padding:8px 12px; font-size:13px; }
  .bar button { background:#4f7cff; color:#fff; border:none; border-radius:6px; padding:8px 14px; font-size:13px; cursor:pointer; }
  .stage { position:relative; height:520px; }
  .layer { position:absolute; left:0; right:0; height:1px; background:#1e2230; }
  .layer-label { position:absolute; left:16px; font-size:10px; color:#4a5060; text-transform:uppercase; letter-spacing:.05em; }
  .node { position:absolute; width:70px; height:70px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; text-align:center; background:#1a1e29; border:2px solid #2c313d; color:#7a8194; }
  .node.path { background:#22314f; border-color:#4f7cff; color:#dce4ff; box-shadow:0 0 0 4px rgba(79,124,255,.15); }
  .edge { position:absolute; height:2px; background:linear-gradient(90deg,#4f7cff,#8fb0ff); }
  .tag { position:absolute; background:#1c2130; border:1px solid #4f7cff; border-radius:5px; padding:2px 6px; font-size:9px; color:#8fb0ff; }
</style>
</head>
<body>
  <div class="bar">
    <span style="font-size:12px;color:#6c7484;">Trace the stack:</span>
    <select><option>TSMC</option></select>
    <span style="color:#4a5060;">→</span>
    <select><option>ChatGPT (App)</option></select>
    <button>Trace path ▸</button>
  </div>
  <div class="stage">
    <div class="layer-label" style="top:40px;">Foundries</div>
    <div class="layer-label" style="top:130px;">Chips</div>
    <div class="layer-label" style="top:220px;">Cloud</div>
    <div class="layer-label" style="top:310px;">Models</div>
    <div class="layer-label" style="top:400px;">Apps</div>

    <div class="node path" style="top:20px;left:60px;">TSMC</div>
    <div class="node path" style="top:110px;left:200px;">NVIDIA H100</div>
    <div class="node path" style="top:200px;left:340px;">Azure</div>
    <div class="node path" style="top:290px;left:480px;">GPT-4o</div>
    <div class="node path" style="top:380px;left:620px;">ChatGPT</div>

    <div class="edge" style="top:55px;left:110px;width:110px;transform:rotate(35deg);"></div>
    <div class="edge" style="top:145px;left:250px;width:110px;transform:rotate(35deg);"></div>
    <div class="edge" style="top:235px;left:390px;width:110px;transform:rotate(35deg);"></div>
    <div class="edge" style="top:325px;left:530px;width:110px;transform:rotate(35deg);"></div>

    <div class="tag" style="top:70px;left:150px;">manufactures</div>
    <div class="tag" style="top:160px;left:290px;">hosts</div>
    <div class="tag" style="top:250px;left:430px;">powers</div>
    <div class="tag" style="top:340px;left:570px;">built-on</div>
  </div>
</body>
</html>

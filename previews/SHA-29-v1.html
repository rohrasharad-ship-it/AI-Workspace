<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>SHA-29 — Save My Contact (mockup)</title>
<style>
  :root {
    --bg-dark: #111111;
    --text-inverse: #F5EDE0;
    --accent: #E8351A;
    --muted: #8A8A8A;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: #F5EDE0;
    color: #1A1A1A;
    padding: 48px 24px;
  }
  .label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 24px;
    text-align: center;
  }
  .frame {
    max-width: 760px;
    margin: 0 auto;
    background: var(--bg-dark);
    border-radius: 20px;
    padding: 56px 40px;
    color: var(--text-inverse);
    text-align: center;
  }
  .frame .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #8A8A8A;
    margin-bottom: 12px;
  }
  .frame h2 {
    font-size: 44px;
    font-weight: 400;
    margin: 0 0 32px;
  }
  .pills {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 999px;
    padding: 12px 20px;
    font-size: 14px;
    color: var(--text-inverse);
  }
  .pill.new {
    border-color: var(--accent);
    background: rgba(232,53,26,0.12);
    position: relative;
  }
  .pill.new::after {
    content: "NEW";
    position: absolute;
    top: -10px;
    right: -8px;
    background: var(--accent);
    color: white;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 999px;
  }
</style>
</head>
<body>
  <div class="label">Minimal mockup — SHA-29 · Save My Contact · third pill in Contact section</div>
  <div class="frame">
    <div class="eyebrow">04 — Contact</div>
    <h2>Let's talk.</h2>
    <div class="pills">
      <div class="pill">✉️ rohrasharad@gmail.com</div>
      <div class="pill">🔗 linkedin.com/in/sharadrohra</div>
      <div class="pill new">📇 Save Contact</div>
    </div>
  </div>
</body>
</html>

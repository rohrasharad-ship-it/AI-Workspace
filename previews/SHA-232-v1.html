<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SHA-232 preview — Life-area agent activity line</title>
<style>
  body { margin: 0; padding: 40px; background: #0f1115; color: #e6e8eb; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .note { color: #9199a6; font-size: 13px; margin-bottom: 24px; }
  .graph { max-width: 620px; display: flex; flex-wrap: wrap; gap: 22px; justify-content: center; padding: 30px; background: #161920; border: 1px solid #262b35; border-radius: 16px; }
  .center { width: 100%; display: flex; justify-content: center; margin-bottom: 4px; }
  .you { width: 84px; height: 84px; border-radius: 50%; background: #2a2f3d; display: flex; align-items: center; justify-content: center; font-weight: 700; border: 1px solid #3a4152; }
  .node { display: flex; flex-direction: column; align-items: center; width: 110px; }
  .circle { width: 64px; height: 64px; border-radius: 50%; background: #1c2230; border: 1px solid #2c3344; display: flex; align-items: center; justify-content: center; font-size: 13px; }
  .label { margin-top: 8px; font-size: 12px; color: #cfd3da; }
  .activity { margin-top: 3px; font-size: 11px; color: #7fb0e0; }
  .activity.muted { color: #5c6270; }
  .highlight-box { outline: 2px dashed #7fb0e0; outline-offset: 6px; border-radius: 14px; padding: 4px; }
</style>
</head>
<body>
  <div class="note">Minimal-effort mockup for SHA-232 — static frame showing placement only, not a build.</div>
  <div class="graph">
    <div class="center"><div class="you">You</div></div>

    <div class="node highlight-box">
      <div class="circle">Health</div>
      <div class="label">Health</div>
      <div class="activity">Last read: Claude, 2h ago</div>
    </div>

    <div class="node highlight-box">
      <div class="circle">Career</div>
      <div class="label">Career</div>
      <div class="activity">Last read: Codex, 1d ago</div>
    </div>

    <div class="node">
      <div class="circle">Music</div>
      <div class="label">Music</div>
      <div class="activity muted">No agent reads yet</div>
    </div>

    <div class="node">
      <div class="circle">Travel</div>
      <div class="label">Travel</div>
      <div class="activity">Last read: Claude, 6d ago</div>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Preview: Export catalog data as JSON/CSV — SHA-148</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#0A0F1E; color:#E2E8F0; font-family:system-ui,-apple-system,sans-serif; overflow:hidden; }
.tag { position:fixed; top:10px; left:10px; z-index:999; background:#F59E0B; color:#1E1300; font-size:11px; font-weight:800; padding:4px 9px; border-radius:5px; letter-spacing:0.03em; }

#controls { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; align-items:center; gap:10px; padding:10px 14px; background:rgba(10,15,30,0.96); border-bottom:1px solid rgba(255,255,255,0.08); height:56px; }
#title { font-size:14px; font-weight:700; color:#F8FAFC; white-space:nowrap; }
#title span { color:#38BDF8; }
#search { flex:0 1 180px; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.12); border-radius:6px; padding:6px 10px; color:#E2E8F0; font-size:12px; }
.filter-btn { padding:5px 10px; border-radius:6px; border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.06); color:#CBD5E1; font-size:11px; }
.filter-btn.active { background:rgba(56,189,248,0.2); border-color:#38BDF8; color:#F8FAFC; font-weight:600; }
#stats { margin-left:auto; font-size:11px; color:#64748B; }
#export-wrap { position:relative; }
#export-btn { padding:5px 10px; border-radius:6px; border:1px solid rgba(16,185,129,0.4); background:rgba(16,185,129,0.15); color:#6EE7B7; font-size:11px; cursor:pointer; display:flex; align-items:center; gap:6px; }
#export-menu { position:absolute; top:38px; right:0; width:190px; background:#0E1629; border:1px solid rgba(255,255,255,0.12); border-radius:8px; box-shadow:0 14px 34px rgba(0,0,0,0.5); overflow:hidden; }
.export-opt { padding:10px 12px; font-size:11.5px; color:#CBD5E1; cursor:pointer; border-bottom:1px solid rgba(255,255,255,0.05); display:flex; justify-content:space-between; align-items:center; }
.export-opt:last-child { border-bottom:none; }
.export-opt:hover { background:rgba(255,255,255,0.06); }
.export-opt b { color:#F8FAFC; }
.export-opt span { font-size:9px; color:#64748B; }
#export-note { padding:9px 12px; font-size:9.5px; color:#475569; border-top:1px solid rgba(255,255,255,0.06); background:rgba(255,255,255,0.02); }

#clear-btn { padding:5px 10px; border-radius:6px; border:1px solid rgba(255,255,255,0.15); background:rgba(168,85,247,0.15); color:#E0D4FF; font-size:11px; }

#canvas-container { position:fixed; top:56px; left:0; right:0; bottom:0; background:radial-gradient(ellipse at center, #0E1629 0%, #0A0F1E 100%); }
.faux-node { position:absolute; width:34px; height:34px; border-radius:50%; background:#1E293B; border:1.5px solid rgba(255,255,255,0.15); }
</style>
</head>
<body>
<div class="tag">STATIC PREVIEW · SHA-148 · Export catalog data as JSON/CSV (not functional)</div>

<div id="controls">
  <div id="title">AI Landscape <span>2026</span> v4</div>
  <input id="search" type="text" placeholder="Search..." disabled/>
  <button class="filter-btn active">All</button>
  <button class="filter-btn">Hardware</button>
  <button class="filter-btn">Models</button>
  <div id="stats">128 tools visible</div>
  <div id="export-wrap">
    <button id="export-btn">&#8681; Export data</button>
    <div id="export-menu">
      <div class="export-opt"><b>JSON</b><span>128 nodes, 96 links</span></div>
      <div class="export-opt"><b>CSV</b><span>flat node table</span></div>
      <div id="export-note">Exports the current filtered view, not the full catalog.</div>
    </div>
  </div>
  <button id="clear-btn">Clear Selection</button>
</div>

<div id="canvas-container">
  <div class="faux-node" style="top:30%;left:20%"></div>
  <div class="faux-node" style="top:55%;left:35%"></div>
  <div class="faux-node" style="top:22%;left:60%"></div>
  <div class="faux-node" style="top:65%;left:70%"></div>
  <div class="faux-node" style="top:45%;left:50%"></div>
</div>

</body>
</html>

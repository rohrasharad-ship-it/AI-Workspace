<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>SHA-126 preview — Approve/Reject actions</title>
<style>
  :root{--paper:#faf8f4;--paper-strong:#fffdf8;--surface-soft:#f7f4ef;--ink:#191816;--muted:#6d675f;--line:rgba(25,24,22,0.13);--moss:#2f4937;--moss-soft:rgba(47,73,55,0.13);--terracotta:#c7522a;--terracotta-soft:rgba(199,82,42,0.12);--gold:#91651f;--gold-soft:rgba(145,101,31,0.13);--serif:Georgia,"Times New Roman",serif;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;--mono:"SFMono-Regular",Consolas,monospace}
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);padding:32px}
  .note{max-width:640px;margin:0 0 20px;font-family:var(--mono);font-size:12px;color:#9f3717;text-transform:uppercase;letter-spacing:.02em}
  .detail-panel{max-width:420px;border:1px solid var(--line);border-radius:8px;background:rgba(255,253,248,.9);box-shadow:0 22px 70px rgba(55,39,28,.09);padding:18px;display:grid;gap:16px}
  .detail-head{display:flex;flex-wrap:wrap;gap:8px}
  .type-pill{width:fit-content;border:1px solid var(--line);border-radius:999px;padding:5px 8px;background:var(--gold-soft);color:var(--gold);font-family:var(--mono);font-size:12px}
  .review-pill{width:fit-content;border:1px solid var(--line);border-radius:999px;padding:5px 8px;background:var(--gold-soft);color:var(--gold);font-family:var(--mono);font-size:12px}
  h2{font-family:var(--serif);font-size:26px;margin:0}
  p{color:var(--muted);font-size:15px;line-height:1.5;margin:0}
  .action-row{display:flex;flex-wrap:wrap;gap:8px}
  .action-row button{min-height:38px;border:1px solid var(--line);border-radius:999px;padding:0 14px;background:var(--surface-soft);color:var(--ink);cursor:default;font-weight:700;font-family:var(--sans);font-size:14px}
  .action-row button.new{position:relative;border-style:dashed}
  .action-row button.approve{border-color:rgba(47,73,55,.4);background:var(--moss-soft);color:var(--moss)}
  .action-row button.reject{border-color:rgba(199,82,42,.4);background:var(--terracotta-soft);color:#9f3717}
  .new:after{content:"NEW";position:absolute;top:-9px;right:-6px;background:var(--terracotta);color:#fff;font-family:var(--mono);font-size:9px;font-weight:800;border-radius:999px;padding:2px 6px}
</style>
</head>
<body>
  <p class="note">Proposed — Linear SHA-126 — minimal-effort mockup, not final UI</p>
  <div class="detail-panel">
    <div class="detail-head">
      <span class="type-pill">Note</span>
      <span class="review-pill">Pending</span>
    </div>
    <h2>Note from last week's meeting about fitness</h2>
    <p>Discussed cardio endurance, strength training, half marathon timing, gym membership updates, and buying new running shoes.</p>
    <div class="action-row">
      <button class="approve new" type="button">Approve</button>
      <button class="reject new" type="button">Reject</button>
      <button type="button">Edit</button>
      <button type="button">Correct</button>
      <button type="button">Archive</button>
    </div>
  </div>
</body>
</html>

<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>SHA-124 preview — Side-by-side node comparison</title>
<style>
  body { margin:0; font-family: -apple-system, Segoe UI, Roboto, sans-serif; background:#0b0d12; color:#e8eaf0; }
  .page { display:flex; height:100vh; }
  .canvas { flex:1; display:flex; align-items:center; justify-content:center; color:#3a3f52; font-size:13px; }
  .compare { width:520px; background:#12151d; border-left:1px solid #232838; padding:16px; box-sizing:border-box; }
  .compare h3 { margin:0 0 12px; font-size:13px; color:#9fb0ff; font-weight:600; text-transform:uppercase; letter-spacing:.04em; }
  .cards { display:flex; gap:12px; }
  .card { flex:1; background:#1a1e2a; border:1px solid #2b3145; border-radius:10px; padding:14px; }
  .card .name { font-weight:700; font-size:15px; margin-bottom:4px; }
  .card .cat { font-size:11px; color:#7d8bb8; margin-bottom:10px; }
  .bar-row { display:flex; align-items:center; gap:6px; font-size:11px; color:#a8b0c3; margin-bottom:6px; }
  .bar { flex:1; height:5px; background:#232838; border-radius:3px; overflow:hidden; }
  .bar-fill { height:100%; background:#3b5bfd; }
  .conn { font-size:11px; color:#7fe0a8; margin-top:8px; }
</style>
</head>
<body>
<div class="page">
  <div class="canvas">[ existing radial map canvas — unchanged ]</div>
  <div class="compare">
    <h3>Comparing 2 tools</h3>
    <div class="cards">
      <div class="card">
        <div class="name">Midjourney</div>
        <div class="cat">Applications → Creative → Image Gen</div>
        <div class="bar-row">Popularity<div class="bar"><div class="bar-fill" style="width:82%"></div></div></div>
        <div class="conn">Shares 3 connections</div>
      </div>
      <div class="card">
        <div class="name">Stable Diffusion</div>
        <div class="cat">Applications → Creative → Image Gen</div>
        <div class="bar-row">Popularity<div class="bar"><div class="bar-fill" style="width:74%"></div></div></div>
        <div class="conn">Shares 3 connections</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>

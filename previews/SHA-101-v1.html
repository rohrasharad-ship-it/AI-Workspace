<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Shareable Deep Links — mockup</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<style>
  :root{
    --bg:#0a0c14; --panel:#12151f; --border:#242938; --text:#e8eaf1; --dim:#7a8194;
    --accent:#8b6cf2; --green:#3ecf8e;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,Segoe UI,Roboto,sans-serif;}
  header{display:flex;align-items:center;gap:16px;padding:10px 16px;border-bottom:1px solid var(--border);background:#0d0f1a;}
  .brand{font-weight:700;font-size:16px;}
  .search{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--dim);font-size:13px;width:200px;}
  .catbtn{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:12px;color:var(--text);}
  .catbtn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .sharebtn{margin-left:auto;display:flex;align-items:center;gap:6px;background:var(--accent);color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:13px;font-weight:600;}
  .newtag{background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.03em;margin-right:6px;}
  main{padding:60px 40px;display:flex;justify-content:center;}
  .modal{background:var(--panel);border:1px solid var(--border);border-radius:14px;width:520px;padding:22px 24px;box-shadow:0 20px 60px rgba(0,0,0,.5);}
  .modal h3{margin:0 0 4px;font-size:15px;}
  .modal p.sub{margin:0 0 16px;color:var(--dim);font-size:12.5px;}
  .urlbox{display:flex;align-items:center;gap:8px;background:#0d0f1a;border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
  .urlbox code{color:var(--green);font-size:12.5px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .copybtn{background:var(--accent);border:none;color:#fff;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:600;flex-shrink:0;}
  .toast{margin-top:12px;font-size:12px;color:var(--green);display:flex;align-items:center;gap:6px;}
  .preview{margin-top:18px;border:1px dashed var(--border);border-radius:10px;padding:14px;background:#0d0f1a;}
  .preview .row{display:flex;justify-content:space-between;font-size:12px;color:var(--dim);padding:4px 0;}
  .preview .row b{color:var(--text);font-weight:500;}
</style>
</head>
<body>
<header>
  <div class="brand">AI Landscape</div>
  <input class="search" value="deepseek" readonly/>
  <div class="catbtn active">Models</div>
  <div class="catbtn">Infra</div>
  <button class="sharebtn"><span class="newtag">NEW</span>Share this view</button>
</header>
<main>
  <div class="modal">
    <h3>Share this view</h3>
    <p class="sub">This link reopens the map with your exact search, filters and selection.</p>
    <div class="urlbox">
      <code>ai-landscape/?node=deepseek&amp;cat=models&amp;pop=60&amp;link=1</code>
      <button class="copybtn">Copy</button>
    </div>
    <div class="toast">&#10003; Link copied to clipboard</div>
    <div class="preview">
      <div class="row"><span>Selected node</span><b>DeepSeek</b></div>
      <div class="row"><span>Category filter</span><b>Models</b></div>
      <div class="row"><span>Popularity &ge;</span><b>60</b></div>
      <div class="row"><span>Link strength &ge;</span><b>1</b></div>
    </div>
  </div>
</main>
</body>
</html>

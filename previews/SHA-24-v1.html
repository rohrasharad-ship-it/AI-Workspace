<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>SHA-24 preview — Decision-Rationale Tooltips</title>
<style>
  body { margin:0; font-family: 'DM Sans', Arial, sans-serif; background:#111111; color:#F5EDE0; }
  .panel { max-width: 640px; margin: 60px auto; padding: 40px; background:#111111; }
  .label { font-family: monospace; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:#8A8A8A; margin-bottom:8px; }
  .metric-row { display:flex; align-items:center; gap:14px; position:relative; }
  .metric { font-weight:700; font-size:64px; color:#E8351A; }
  .info-dot {
    width:22px; height:22px; border-radius:50%;
    border:1.5px solid #E8351A; color:#E8351A;
    display:flex; align-items:center; justify-content:center;
    font-family: monospace; font-size:13px; cursor:pointer;
    flex-shrink:0; margin-top:10px;
  }
  .tooltip {
    margin-top:18px; padding:16px 18px; max-width:420px;
    background:rgba(232,53,26,0.08); border-left:3px solid #E8351A;
    font-size:14px; line-height:1.5; color:#F5EDE0;
  }
  .tooltip b { color:#FF8C52; }
  .caption { text-align:center; color:#8A8A8A; font-family:monospace; font-size:12px; margin-top:40px; }
</style>
</head>
<body>
  <div class="panel">
    <div class="label">Amadeus — Business line</div>
    <div class="metric-row">
      <div class="metric">$2B+</div>
      <div class="info-dot">i</div>
    </div>
    <div class="tooltip">
      <b>The real tradeoff:</b> Chose to migrate the platform before adding new
      partner-facing features — slower visible progress for two quarters, but
      avoided rebuilding the integration layer twice.
    </div>
  </div>
  <div class="caption">STATIC MOCKUP — SHA-24 — shows concept only, not final copy/styling</div>
</body>
</html>

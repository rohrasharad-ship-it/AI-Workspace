<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>SHA-48 — Weekly digest mockup</title>
<style>
  body { margin:0; padding:40px; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:#0e0f11; color:#e6e6e6; }
  .note { color:#888; font-size:13px; margin-bottom:20px; }
  .card { max-width:460px; background:#1a1b1e; border:1px solid #2a2b2e; border-radius:12px; padding:22px; }
  h2 { margin:0 0 16px; font-size:16px; }
  .stat-row { display:flex; gap:16px; margin-bottom:18px; }
  .stat { flex:1; background:#151619; border-radius:8px; padding:12px; text-align:center; }
  .stat b { display:block; font-size:22px; }
  .stat span { font-size:12px; color:#9aa0a6; }
  .bar-label { font-size:13px; color:#c2c6cc; display:flex; justify-content:space-between; margin-bottom:6px; }
  .bar-bg { background:#151619; border-radius:5px; height:8px; margin-bottom:14px; overflow:hidden; }
  .bar-fill { height:100%; background:#4ea7fc; border-radius:5px; }
</style>
</head>
<body>
  <div class="note">Minimal-effort mockup — weekly Slack digest layout. Static, no live data.</div>
  <div class="card">
    <h2>🗓️ Week of Jun 29 — Outreach Digest</h2>
    <div class="stat-row">
      <div class="stat"><b>14</b><span>applications sent</span></div>
      <div class="stat"><b>18%</b><span>response rate</span></div>
      <div class="stat"><b>3</b><span>follow-ups due</span></div>
    </div>
    <div class="bar-label"><span>Cold email variant "specific-ask"</span><span>24%</span></div>
    <div class="bar-bg"><div class="bar-fill" style="width:24%"></div></div>
    <div class="bar-label"><span>Cold email variant "generic"</span><span>9%</span></div>
    <div class="bar-bg"><div class="bar-fill" style="width:9%; background:#666"></div></div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snippet — Hero stagger (Anime.js)</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0a0a0f;
      color: #f4f4f5;
      min-height: 100vh;
      display: grid;
      place-items: center;
      margin: 0;
    }
    h1 { font-size: clamp(2rem, 6vw, 3.5rem); text-align: center; max-width: 14ch; }
    .word { display: inline-block; opacity: 0; }
    .gradient {
      background: linear-gradient(135deg, #8b5cf6, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>
</head>
<body>
  <h1 id="title">
    <span class="word">Make</span>
    <span class="word">your</span>
    <span class="word gradient">site</span>
    <span class="word">memorable</span>
  </h1>

  <script type="module">
    import { createTimeline, stagger } from 'https://cdn.jsdelivr.net/npm/animejs@4.0.2/+esm';

    createTimeline({ defaults: { ease: 'outExpo', duration: 900 } })
      .add('.word', { opacity: [0, 1], translateY: [40, 0] }, stagger(80));
  </script>
</body>
</html>
